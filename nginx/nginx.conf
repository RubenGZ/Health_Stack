# ============================================================
# nginx.conf — HealthStack Pro (Producción)
# Reverse proxy + TLS termination + Security headers
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Rate limiting (complementa slowapi del backend) ───────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Ocultar versión nginx ─────────────────────────────────────────────────
    server_tokens   off;

    # ── Upstream FastAPI ──────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS principal ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name healthstack.app www.healthstack.app;  # ← cambiar por dominio real

        # ── TLS (Let's Encrypt via Certbot) ──────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/healthstack.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/healthstack.app/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

        # ── Frontend estático ─────────────────────────────────────────────────
        root /opt/healthstack-pro/static;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /landing/ {
            alias /opt/healthstack-pro/static/landing/;
            try_files $uri $uri/ /landing/index.html;
        }

        # ── API Backend ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Tamaño máximo del body (protección contra ataques de payload grande)
            client_max_body_size 1m;
        }

        # Rate limit más estricto para endpoints de autenticación
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            client_max_body_size 64k;
        }

        # Health check (acceso público, sin rate limit)
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;  # No loguear health checks
        }

        # Prometheus metrics (solo acceso interno — bloquear desde exterior)
        location /metrics {
            deny all;
            return 403;
        }

        # Bloquear acceso a docs en producción (FastAPI ya los desactiva,
        # pero doble protección por si se activa debug accidentalmente)
        location ~ ^/(docs|redoc|openapi\.json) {
            deny all;
            return 403;
        }

        # ── Let's Encrypt ACME challenge ──────────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}
