# =============================================================================
# HealthStack Pro — LOCAL DEVELOPMENT
# Frontend is NOT containerised; open frontend/index.html directly in a browser
# or run: python -m http.server 3000 --directory frontend/
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: healthstack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthstack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: healthstack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI Backend  (hot-reload via volume mount)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthstack_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # .env file supplies all app secrets; DATABASE_URL / REDIS_URL are
    # overridden below so they point at the Docker service names, not localhost.
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/healthstack
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/healthstack
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload; alembic migrations are included
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
