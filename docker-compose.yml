# ============================================================
# HealthStack Pro V2 — Docker Compose
# Levanta: PostgreSQL + Backend FastAPI
# Uso: docker compose up --build
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: healthstack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: healthstack_pro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthstack_pro"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthstack_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Sobreescribe localhost por el nombre del servicio Docker
      DATABASE_URL: postgresql+asyncpg://postgres:P%40ssw0rd@db:5432/healthstack_pro
      DATABASE_SYNC_URL: postgresql://postgres:P%40ssw0rd@db:5432/healthstack_pro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
    name: healthstack_postgres_data
