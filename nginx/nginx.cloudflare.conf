# =============================================================================
# nginx.cloudflare.conf — HealthStack Pro on Raspberry Pi
# HTTP only — Cloudflare Tunnel handles TLS externally.
# Used for EXPOSE_MODE=quick and EXPOSE_MODE=cloudflare
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript
                  text/xml application/xml text/javascript;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=api:10m   rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

    # ── Mobile user-agent detection ──────────────────────────────────────────
    map $http_user_agent $is_mobile {
        default 0;
        ~*(android|iphone|ipod|ipad|blackberry|iemobile|opera.mini|mobile|windows.phone) 1;
    }

    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Cloudflare passes the real client IP in this header
        real_ip_header     CF-Connecting-IP;
        set_real_ip_from   0.0.0.0/0;

        # Frontend SPA
        root /usr/share/nginx/html/app;

        location / {
            if ($is_mobile) {
                return 302 /mobile/;
            }
            try_files $uri $uri/ /index.html;
        }

        # Mobile SPA (React/Vite)
        location /mobile/ {
            alias /usr/share/nginx/html/app/mobile/;
            try_files $uri $uri/ /mobile/index.html;
        }

        # Admin SPA — sirve admin.html (antes que location /)
        location = /admin {
            try_files /admin.html =404;
        }

        # Admin API — proxy con rate limit estricto
        location /api/v1/admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Landing page
        location /landing/ {
            if ($is_mobile) {
                return 302 /mobile/;
            }
            alias /usr/share/nginx/html/landing/;
            try_files $uri $uri/ /landing/index.html;
        }

        # API — proxy to FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Health check — no logs to avoid noise
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # Block external access to metrics
        location /metrics {
            deny all;
            return 403;
        }

        # Block API docs in production
        location ~ ^/(docs|redoc|openapi\.json) {
            deny all;
            return 403;
        }
    }
}
