    <!-- ═══ SCHEMA.ORG — FAQ (Featured Snippets) ════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es el TDEE y cómo se calcula?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El TDEE (Total Daily Energy Expenditure) es el total de calorías que quemas en un día, incluyendo metabolismo basal y actividad física. Se calcula multiplicando tu TMB (Tasa Metabólica Basal) por tu factor de actividad: Sedentario ×1.2, Ligeramente activo ×1.375, Moderadamente activo ×1.55, Muy activo ×1.725. HealthStack Pro lo calcula automáticamente con tu peso, altura, edad y nivel de actividad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánta proteína necesito al día para ganar músculo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para ganar músculo se recomienda entre 1.6 y 2.2 gramos de proteína por kilogramo de peso corporal al día. Por ejemplo, si pesas 75 kg necesitas entre 120 g y 165 g de proteína diaria. HealthStack Pro calcula tus macros personalizados según tu objetivo: pérdida de grasa, mantenimiento o volumen muscular."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué son los macros y cómo los calculo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Los macros (macronutrientes) son proteínas, carbohidratos y grasas — las tres fuentes de energía de tu dieta. Para calcularlos: primero obtén tu TDEE, luego distribuye las calorías según tu objetivo. Para volumen: 30% proteína, 45% carbohidratos, 25% grasa. Para definición: 40% proteína, 35% carbohidratos, 25% grasa. HealthStack Pro hace este cálculo automáticamente y te muestra el desglose diario."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es gratis HealthStack Pro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, HealthStack Pro tiene un plan gratuito completo y permanente, sin tarjeta de crédito. Incluye calculadora TDEE, calculadora de macros, tracking de peso, rutinas personalizadas y gamificación con XP. El plan Pro añade experiencia sin anuncios y funciones avanzadas de IA."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuántas calorías debo comer para perder peso?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para perder peso de forma saludable, crea un déficit calórico de 300-500 kcal sobre tu TDEE. Por ejemplo, si tu TDEE es 2.500 kcal, come entre 2.000 y 2.200 kcal al día. Esto genera una pérdida de 0.3-0.5 kg por semana. HealthStack Pro calcula tu TDEE y te sugiere el déficit óptimo según tu objetivo y ritmo de pérdida deseado."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuántos días a la semana debo entrenar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para principiantes: 3 días por semana con descanso entre sesiones (ej. lunes, miércoles, viernes). Para intermedios: 4-5 días. Para avanzados: 5-6 días con splits musculares (push/pull/legs). Lo más importante es la consistencia y la recuperación. HealthStack Pro genera tu rutina personalizada según tu nivel, tiempo disponible y equipamiento."
          }
        },
        {
          "@type": "Question",
          "name": "¿Funciona la creatina?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, la creatina monohidrato es el suplemento más respaldado por la ciencia para el rendimiento deportivo. Aumenta la fuerza y potencia en un 5-15% y mejora la recuperación muscular. Dosis recomendada: 3-5 gramos al día sin fase de carga. Es segura para adultos sanos según la evidencia científica actual."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es mi IMC y qué significa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El IMC (Índice de Masa Corporal) se calcula dividiendo tu peso en kg entre tu altura en metros al cuadrado. Categorías OMS: Bajo peso <18.5, Normal 18.5-24.9, Sobrepeso 25-29.9, Obesidad ≥30. El IMC es un indicador general — no distingue entre músculo y grasa. HealthStack Pro calcula tu IMC junto con el TDEE y los macros para darte una imagen completa."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es la mejor app gratuita para contar calorías en español?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HealthStack Pro es la app fitness gratuita más completa en español. Incluye calculadora TDEE, seguimiento de macros, generador de rutinas con IA, tracking de peso, gamificación y comunidad. A diferencia de MyFitnessPal o Cronometer, tiene calculadora TDEE integrada y generador de rutinas personalizadas sin pago adicional."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo calcular mi 1RM (una repetición máxima)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Usa la fórmula de Epley: 1RM = peso × (1 + repeticiones/30). Ejemplo: si levantas 80 kg en 8 repeticiones, tu 1RM estimado es 80 × (1 + 8/30) = 80 × 1.267 = 101 kg. HealthStack Pro tiene una calculadora de 1RM integrada que también muestra el porcentaje de carga para cada rango de repeticiones."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánta proteína necesito para perder grasa sin perder músculo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Durante un déficit calórico necesitas más proteína que en mantenimiento para proteger la masa muscular: entre 2.0 y 2.4 gramos por kilogramo de peso corporal al día. Para una persona de 75 kg, eso es 150-180 g de proteína diaria. La proteína alta en déficit aumenta la saciedad, mantiene el metabolismo y preserva el músculo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo genero una rutina de gym personalizada gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HealthStack Pro genera rutinas personalizadas gratis en segundos. Responde 7 preguntas: objetivo (volumen/definición/fuerza), nivel (principiante/intermedio/avanzado), días disponibles, equipamiento, posibles lesiones, edad y sexo. La IA crea un plan semanal con ejercicios, series, repeticiones y descansos adaptados específicamente a ti."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué comer antes y después de entrenar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Antes de entrenar (1-2h antes): carbohidratos de digestión media + proteína moderada. Ejemplo: arroz con pollo, avena con proteína. Después de entrenar (dentro de las 2h): proteína rápida + carbohidratos. Ejemplo: batido de proteína + plátano, pollo con patata. HealthStack Pro incluye un planificador de nutrición con timing óptimo basado en tu horario de entrenamiento."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuántas calorías tiene [alimento] y cómo afecta a mis macros?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HealthStack Pro tiene una base de datos de 142+ ingredientes con calorías y macronutrientes completos. El tracker de nutrición calcula automáticamente el impacto de cada alimento en tu objetivo diario de calorías, proteínas, carbohidratos y grasas. También incluye 28+ recetas fit con macros ya calculados."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo perder grasa sin perder músculo (recomposición corporal)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La recomposición corporal (perder grasa y ganar músculo simultáneamente) es posible especialmente en principiantes o personas con sobrepeso. Requiere: déficit calórico moderado (200-300 kcal), proteína alta (2-2.4g/kg), entrenamiento de fuerza progresivo 3-5 días/semana, y suficiente descanso (7-9h de sueño). HealthStack Pro optimiza tu plan para recomposición corporal."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es mejor MyFitnessPal o HealthStack Pro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HealthStack Pro ofrece más valor gratuito que MyFitnessPal: incluye calculadora TDEE integrada (MFP no la tiene), generador de rutinas con IA (MFP no tiene), gamificación con XP y niveles, y comunidad. MyFitnessPal tiene una base de datos de alimentos más grande, pero sus funciones avanzadas requieren suscripción Premium (€19.99/mes). HealthStack Pro es gratuito para siempre en funciones core."
          }
        }
      ]
    }
    </script>

    <!-- ═══ SCHEMA.ORG — HowTo (TDEE Calculator) ════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "Cómo calcular tu TDEE y macros",
      "description": "Guía paso a paso para calcular tu gasto calórico total (TDEE) y tus macronutrientes diarios para perder grasa o ganar músculo.",
      "totalTime": "PT5M",
      "tool": {
        "@type": "HowToTool",
        "name": "Calculadora TDEE HealthStack Pro"
      },
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Calcula tu Tasa Metabólica Basal (TMB)",
          "text": "Usa la fórmula de Mifflin-St Jeor. Hombres: TMB = (10 × peso kg) + (6.25 × altura cm) − (5 × edad) + 5. Mujeres: TMB = (10 × peso kg) + (6.25 × altura cm) − (5 × edad) − 161."
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Multiplica por tu factor de actividad",
          "text": "Sedentario (poco o ningún ejercicio): ×1.2. Ligeramente activo (1-3 días/semana): ×1.375. Moderadamente activo (3-5 días/semana): ×1.55. Muy activo (6-7 días/semana): ×1.725."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Ajusta según tu objetivo",
          "text": "Perder grasa: resta 300-500 kcal de tu TDEE. Mantener peso: come exactamente tu TDEE. Ganar músculo: añade 200-300 kcal a tu TDEE."
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "Distribuye tus macronutrientes",
          "text": "Proteína: 1.6-2.2 g/kg de peso (4 kcal/g). Carbohidratos: rellena el resto de calorías (4 kcal/g). Grasas: 20-30% de calorías totales (9 kcal/g)."
        }
      ]
    }
    </script>
