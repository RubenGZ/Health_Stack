# =============================================================================
# nginx.pi.conf — HealthStack Pro en Raspberry Pi
# Solo HTTP — Cloudflare Tunnel gestiona TLS externamente.
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    gzip              on;
    gzip_comp_level   6;        # 1=fast/weak → 6=balanced → 9=slow/best
    gzip_vary         on;       # Vary: Accept-Encoding header for CDN/proxies
    gzip_proxied      any;
    gzip_static       on;       # serve pre-built .gz files — zero CPU per request
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml text/javascript
                      application/wasm image/svg+xml font/woff2;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

    # ── Mobile user-agent detection ──────────────────────────────────────────
    map $http_user_agent $is_mobile {
        default 0;
        ~*(android|iphone|ipod|ipad|blackberry|iemobile|opera.mini|mobile|windows.phone) 1;
    }

    upstream backend {
        server backend:8000;
        keepalive 16;
        keepalive_requests 100;
        keepalive_timeout 75s;
    }

    server {
        listen 80;
        server_name _;

        # Cloudflare Tunnel reenvía la IP real en este header
        real_ip_header     CF-Connecting-IP;
        set_real_ip_from   0.0.0.0/0;

        # Frontend SPA
        root /usr/share/nginx/html/app;

        location / {
            if ($is_mobile) {
                return 302 /mobile/;
            }
            try_files $uri $uri/ /index.html;
        }

        location /admin {
            try_files /admin.html =404;
        }

        # Mobile PWA — must come before /api/ to avoid prefix conflicts
        location /mobile/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /mobile/index.html;
        }

        location /api/v1/admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # Landing page
        location /landing/ {
            alias /usr/share/nginx/html/landing/;
            try_files $uri $uri/ /landing/index.html;
        }

        # Landing assets — hashed filenames → cache 1 year immutable
        # Prefix location (NOT regex) so alias strips the path prefix correctly
        location /landing/assets/ {
            alias /usr/share/nginx/html/landing/assets/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
        }

        # Auth — límite más estricto (antes que /api/ para que el bloque
        # más específico se evalúe primero en la configuración, aunque nginx
        # usa longest-prefix-match independientemente del orden)
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            client_max_body_size  64k;
        }

        # API — proxy a FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
            client_max_body_size  1m;
        }

        # Health check — sin logs para no saturar
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Connection        "";
            access_log         off;
        }

        # Bloquear métricas de acceso externo
        location /metrics {
            deny all;
            return 403;
        }

        # Bloquear docs en producción
        location ~ ^/(docs|redoc|openapi\.json) {
            deny all;
            return 403;
        }
    }
}
