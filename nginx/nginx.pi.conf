# =============================================================================
# nginx.pi.conf — HealthStack Pro en Raspberry Pi
# Solo HTTP — Cloudflare Tunnel gestiona TLS externamente.
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript
                  text/xml application/xml text/javascript;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Cloudflare Tunnel reenvía la IP real en este header
        real_ip_header     CF-Connecting-IP;
        set_real_ip_from   0.0.0.0/0;

        # Frontend SPA
        root /usr/share/nginx/html/app;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /admin {
            try_files /admin.html =404;
        }

        location /api/v1/admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Landing page
        location /landing/ {
            alias /usr/share/nginx/html/landing/;
            try_files $uri $uri/ /landing/index.html;
        }

        # API — proxy a FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Auth — límite más estricto
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Health check — sin logs para no saturar
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # Bloquear métricas de acceso externo
        location /metrics {
            deny all;
            return 403;
        }

        # Bloquear docs en producción
        location ~ ^/(docs|redoc|openapi\.json) {
            deny all;
            return 403;
        }
    }
}
