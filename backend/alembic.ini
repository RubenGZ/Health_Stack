# Alembic Configuration File
# ===========================
# Documentación: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Ruta al directorio de scripts de migración
script_location = alembic

# Formato del nombre de archivos de migración
# %%(rev)s = hash de revisión, %%(slug)s = descripción corta
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Directorio de caché de revisiones (opcional, mejora rendimiento)
# prepend_sys_path = .

# Timezone para timestamps en nombres de archivo
timezone = UTC

# Longitud del hash de revisión (7 chars es suficiente para historial corto)
truncate_slug_length = 40

# Comparar tipos al generar migraciones automáticas
# Importante para detectar cambios de tipo en columnas existentes
compare_type = true

# URL de la base de datos — se sobreescribe en env.py desde la variable de entorno
# En desarrollo, Alembic usa DATABASE_SYNC_URL del .env
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/healthstack


[post_write_hooks]
# Hooks opcionales después de generar migraciones
# Ejemplo para formatear el código con black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
